<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>{% block title %}Bank{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="phone-frame">
        {% block header %}{% endblock %}

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>

        {% block footer %}{% endblock %}

        {% block nav %}
        <nav class="bottom-nav" aria-label="Primary">
            <a href="{{ url_for('accounts') }}" class="nav-link{% if request.endpoint in ['accounts', 'account'] %} is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9"/></svg>
                </span>
                <span class="nav-label">Home</span>
            </a>
            <a href="{{ url_for('payments') }}" class="nav-link{% if request.endpoint == 'payments' %} is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13M14 5l3 3-3 3"/><path d="M20 16H7M10 19l-3-3 3-3"/></svg>
                </span>
                <span class="nav-label">Payments</span>
            </a>
            <a href="{{ url_for('products') }}" class="nav-link{% if request.endpoint in ['products', 'loans'] %} is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg>
                </span>
                <span class="nav-label">Products</span>
            </a>
        </nav>
        {% endblock %}
    </div>
</body>
</html>
