{% extends "base.html" %}

{% block title %}Add New Payee · Bank{% endblock %}

{% block header %}
<header class="page-header">
    <h1 class="page-header-title">Add New Payee</h1>
    <a href="{{ url_for('payments') }}" class="header-icon-btn" aria-label="Cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </a>
</header>
{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<form class="form-stack" method="POST" action="{{ url_for('add_payee') }}">
    <div class="form-field">
        <label class="form-label" for="name">Payee name</label>
        <input class="form-input form-input--boxed" type="text" id="name" name="name" autocomplete="name" required>
    </div>

    <div class="form-field">
        <label class="form-label" for="bank">Bank</label>
        <input class="form-input form-input--boxed" type="text" id="bank" name="bank" autocomplete="organization" required>
    </div>

    <div class="form-field">
        <label class="form-label" for="account_number">Account number</label>
        <input class="form-input form-input--boxed" type="text" id="account_number" name="account_number" inputmode="numeric" pattern="[0-9]*" required>
    </div>

    <div class="form-field">
        <label class="form-label" for="sort_code">Sort code</label>
        <input class="form-input form-input--boxed" type="text" id="sort_code" name="sort_code" placeholder="e.g. 12-34-56" required>
    </div>

    <button type="submit" class="btn btn-block">Add payee</button>
</form>
{% endblock %}
