{% extends "base.html" %}

{% block title %}Select Payee · Bank{% endblock %}

{% block header %}
<header class="page-header">
    <h1 class="page-header-title">Select Payee</h1>
    <a href="{{ url_for('add_payee') }}" class="header-action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="7" r="4"/>
            <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
            <path d="M19 8v6M16 11h6"/>
        </svg>
        <span class="header-action-label">Add new payee</span>
    </a>
</header>
{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<form method="POST" action="{{ url_for('payments') }}">
    <div class="payee-list">
        {% for payee in payees %}
        <label class="payee-row">
            <input type="radio" name="payee_id" value="{{ payee.id }}" class="payee-row-radio" {% if loop.first %}required{% endif %}>
            <span class="payee-row-indicator" aria-hidden="true"></span>
            <span class="payee-row-info">
                <span class="payee-row-name">{{ payee.name }}</span>
                <span class="payee-row-meta">{{ payee.bank }} · Sort {{ payee.sort_code }}</span>
            </span>
        </label>
        {% endfor %}
    </div>

    <div class="amount-field">
        <label class="form-label" for="amount">Enter amount</label>
        <div class="amount-input-wrap">
            <span class="amount-prefix">£</span>
            <input class="amount-input" type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="0.00" required>
        </div>
    </div>

    <div class="action-bar">
        <a href="{{ url_for('accounts') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn">Submit</button>
    </div>
</form>
{% endblock %}
